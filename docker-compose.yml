x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck: &default-healthcheck
  test: ["CMD-SHELL", "pgrep -f 'hermes --profile' || exit 1"]
  interval: 60s
  timeout: 10s
  retries: 3

x-dev-limits: &dev-limits
  resources:
    limits:
      memory: 512M

x-daily-limits: &daily-limits
  resources:
    limits:
      memory: 256M

services:
  dev-tpm:
    image: ghcr.io/nousresearch/hermes-agent:latest
    container_name: hermes-dev-tpm
    restart: unless-stopped
    logging: *default-logging
    healthcheck: *default-healthcheck
    deploy: *dev-limits
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GIT_AUTHOR_NAME=${GIT_AUTHOR_NAME}
      - GIT_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL}
      - GIT_COMMITTER_NAME=${GIT_AUTHOR_NAME}
      - GIT_COMMITTER_EMAIL=${GIT_AUTHOR_EMAIL}
    volumes:
      - ./data:/opt/data
      - ./skills:/opt/data/skills
      - ./AGENT.md:/opt/data/AGENT.md:ro
      - ./OPINIONS.md:/opt/data/OPINIONS.md:ro
      - ./VOICE.md:/opt/data/VOICE.md:ro
      - ${WORKSPACE_ROOT:-/Users/isfa/projects}:/opt/workspace
      - ${SSH_KEY_PATH:-${HOME}/.ssh}:/root/.ssh:ro
    command: hermes --profile dev_tpm gateway start

