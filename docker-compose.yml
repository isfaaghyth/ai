services:
  dev-kotlin-mobile:
    image: ghcr.io/nousresearch/hermes-agent:latest
    container_name: hermes-dev-kotlin-mobile
    restart: unless-stopped
    volumes:
      - ./data:/opt/data
      - ./skills:/opt/data/skills
    command: hermes --profile dev_kotlin_mobile gateway start
    stdin_open: true
    tty: true

  dev-golang-backend:
    image: ghcr.io/nousresearch/hermes-agent:latest
    container_name: hermes-dev-golang-backend
    restart: unless-stopped
    volumes:
      - ./data:/opt/data
      - ./skills:/opt/data/skills
    command: hermes --profile dev_golang_backend gateway start
    stdin_open: true
    tty: true

  dev-frontend-react:
