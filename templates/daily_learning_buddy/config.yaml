model:
  default: "google/gemini-3.5-flash"
  provider: "openrouter"
  base_url: "https://openrouter.ai/api/v1"

terminal:
  backend: "local"
  cwd: "."
  timeout: 180

agent:
  max_turns: 90
  reasoning_effort: "high"

memory:
  memory_enabled: true
  user_profile_enabled: true

gateway:
  provider: "telegram"
